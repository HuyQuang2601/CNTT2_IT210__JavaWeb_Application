<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiet du an</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <a th:href="@{/projects}" class="btn btn-outline-secondary mb-4">Quay lai danh sach</a>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h1 class="h3 mb-0">Thong tin chi tiet du an</h1>
        </div>
        <div class="card-body">
            <table class="table table-bordered mb-0">
                <tbody>
                <tr>
                    <th width="30%">Ma du an</th>
                    <td th:text="${project.id}"></td>
                </tr>
                <tr>
                    <th>Ten du an</th>
                    <td th:text="${project.name}"></td>
                </tr>
                <tr>
                    <th>Mo ta du an</th>
                    <td th:text="${project.description}"></td>
                </tr>
                <tr>
                    <th>Ten giam doc du an</th>
                    <td th:text="${project.projectDirector}"></td>
                </tr>
                <tr>
                    <th>Ngay bat dau</th>
                    <td th:text="${project.startDate}"></td>
                </tr>
                <tr>
                    <th>Ngay ket thuc</th>
                    <td th:text="${project.endDate}"></td>
                </tr>
                <tr>
                    <th>Tong so nhan su</th>
                    <td th:text="${project.totalMembers}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
